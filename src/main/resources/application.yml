spring:
  profiles:
    active: local
  application:
    name: ai-passage-creator
  # MySQL 数据库配置
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/ai_passage_creator
    username: root
    password: clx740329
  # session 配置
  session:
    store-type: redis
    # session 30 天过期
    timeout: 2592000
  # Redis 配置
  data:
    redis:
      host: localhost
      port: 6379
      database: 0
      password:
mybatis-flex:
  configuration:
    map-underscore-to-camel-case: false
server:
  port: 8567
  servlet:
    context-path: /api
    # cookie 30 天过期
    session:
      cookie:
        max-age: 2592000
# springdoc-openapi 配置
springdoc:
  group-configs:
    - group: 'default'
      paths-to-match: '/**'
      packages-to-scan: com.leo.ai.article.agent.controller
# knife4j 接口文档配置
knife4j:
  enable: true
  setting:
    language: zh_cn
# 自定义邮件业务配置
mail:
  from: 1154027884@qq.com
  code-expire: 300      # 验证码有效期（秒）
  code-cool-down: 60    # 发送冷却时间（秒）
# 文章智能体配置
article:
  agent:
    orchestrator:
      # 是否启用多智能体编排模式（支持配图并行生成）
      # true: 使用 Spring AI Alibaba 多智能体编排
      # false: 使用原有的 ArticleAgentService
      enabled: false
    # Agent 最大迭代次数
    max-iterations: 10
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: always
    prometheus:
      access: unrestricted
  metrics:
    tags:
      application: ${spring.application.name}
  prometheus:
    metrics:
      export:
        enabled: true