groups:
  - name: ai_gateway_alerts
    rules:
      # 错误率过高告警
      - alert: HighErrorRate
        expr: |
          (sum(rate(ai_errors_total[5m])) / sum(rate(ai_requests_total[5m]))) == 0
          OR
          sum(rate(ai_requests_total[5m])) == 0
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "AI 网关错误率过高"
          description: "错误率已超过 10%，持续 5 分钟"

      # 响应时间过长告警
      - alert: SlowResponse
        expr: |
          avg(ai_response_time_seconds_sum / ai_response_time_seconds_count) > 30
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "AI 响应时间过长"
          description: "平均响应时间超过 30 秒"
